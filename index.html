<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | Liderman</title>
    <link rel="stylesheet" href="src/assets/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-lines"></div>
    <div class="login-container">
        <div class="login-header">
            <img src="imagenes/logo.webp" alt="Liderman Logo" class="login-logo"
                style="width: 180px; margin-bottom: 2rem; filter: drop-shadow(0 0 15px rgba(214, 40, 40, 0.5));">
            <h1>Acceso Seguro</h1>
            <p>Bienvenido. Sistema de Control Operativo.</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="su-correo@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••••" required>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordarme</label>
                </div>
                <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>
            </div>

            <button type="submit" id="login-btn">
                <span class="btn-text">Ingresar</span>
                <div class="spinner" hidden></div>
            </button>

            <div id="error-message" class="error-message" hidden></div>
        </form>
    </div>

    <script type="module" src="src/js/login.js"></script>
</body>

</html>
