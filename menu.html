<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Liderman</title>
    <link rel="stylesheet" href="src/assets/styles/menu.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <!-- Overlay de carga visible inmediatamente -->
    <div id="global-loader" class="loading-overlay">
        <div class="hypervelocity-bg" id="stars-container"></div>
        <div class="hex-grid-bg"></div>
        <div class="energy-waves">
            <div class="energy-wave"></div>
            <div class="energy-wave"></div>
            <div class="energy-wave"></div>
        </div>
        <div class="logo-container">
            <div class="orbital-system">
                <div class="orbital-ring orbital-ring-1"></div>
                <div class="orbital-ring orbital-ring-2"></div>
                <div class="orbital-ring orbital-ring-3"></div>
                <div class="energy-core"></div>
                <div class="energy-core-inner"></div>
            </div>
            <img src="imagenes/logo.webp" class="loading-logo" alt="Logo">
        </div>
        <div class="loading-text" data-text="INICIALIZANDO SISTEMA...">INICIALIZANDO SISTEMA...</div>
        <div class="loading-progress-bar">
            <div class="loading-progress-fill"></div>
        </div>
    </div>

    <!-- Hamburger toggle button -->
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Abrir menú" aria-expanded="false">
        <span class="ham-bar"></span>
        <span class="ham-bar"></span>
        <span class="ham-bar"></span>
    </button>

    <!-- Backdrop overlay for sidebar on mobile -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="bg-lines"></div>
    <div class="dashboard-container" style="opacity: 0; transition: opacity 0.5s ease;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="imagenes/logo.webp" alt="Liderman Logo" class="sidebar-logo">
                <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Cerrar menú">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-collection="panel">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Panel</span>
                </a>
                <div class="nav-group">
                    <div class="nav-item nav-item-dropdown" id="checklist-toggle">
                        <span class="material-symbols-outlined">checklist</span>
                        <span>Checklist</span>
                        <span class="material-symbols-outlined dropdown-icon">expand_more</span>
                    </div>
                    <div class="submenu" id="checklist-submenu">
                        <a href="#" class="nav-item submenu-item" data-collection="checklists">
                            <span>Resguardo</span>
                        </a>
                        <a href="#" class="nav-item submenu-item" data-collection="conductor">
                            <span>Conductor</span>
                        </a>
                    </div>
                </div>
                <a href="#" class="nav-item" data-collection="ejercicios">
                    <span class="material-symbols-outlined">fitness_center</span>
                    <span>Ejercicios</span>
                </a>
                <a href="#" class="nav-item" data-collection="incidencias">
                    <span class="material-symbols-outlined">report</span>
                    <span>Incidencias</span>
                </a>
                <a href="#" class="nav-item" data-collection="cambio-led">
                    <span class="material-symbols-outlined">lightbulb</span>
                    <span>Cambio de Led Estado</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" id="logout-btn" class="nav-item">
                    <span class="material-symbols-outlined">logout</span>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1 id="main-title">Panel de Operaciones</h1>
                    <p id="current-date">Cargando fecha...</p>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Buscar en la vista actual...">
                        <span class="material-symbols-outlined">search</span>
                    </div>
                    <div class="user-profile">
                        <span id="user-name-display">Cargando...</span>
                    </div>
                </div>
            </header>

            <div id="content-area">
            </div>
        </main>
    </div>

    <script type="module" src="src/js/dashboard.js"></script>
</body>

</html>
