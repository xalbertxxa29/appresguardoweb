<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Liderman</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">LIDERMAN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-collection="panel">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Panel</span>
                </a>
                <div class="nav-group">
                    <div class="nav-item nav-item-dropdown" id="checklist-toggle">
                        <span class="material-symbols-outlined">checklist</span>
                        <span>Checklist</span>
                        <span class="material-symbols-outlined dropdown-icon">expand_more</span>
                    </div>
                    <div class="submenu" id="checklist-submenu">
                        <a href="#" class="nav-item submenu-item" data-collection="checklists">
                            <span>Resguardo</span>
                        </a>
                        <a href="#" class="nav-item submenu-item" data-collection="conductor">
                            <span>Conductor</span>
                        </a>
                    </div>
                </div>
                <a href="#" class="nav-item" data-collection="ejercicios">
                    <span class="material-symbols-outlined">fitness_center</span>
                    <span>Ejercicios</span>
                </a>
                <a href="#" class="nav-item" data-collection="incidencias">
                    <span class="material-symbols-outlined">report</span>
                    <span>Incidencias</span>
                </a>
                <a href="https://xalbertxxa29.github.io/app-resguardo/control.html" class="nav-item" data-collection="cambio-led">
                    <span class="material-symbols-outlined">lightbulb</span>
                    <span>Cambio de Led Estado</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" id="logout-btn" class="nav-item">
                    <span class="material-symbols-outlined">logout</span>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                 <div class="header-title">
                    <h1 id="main-title">Panel de Operaciones</h1>
                    <p id="current-date">Cargando fecha...</p>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Buscar en la vista actual...">
                        <span class="material-symbols-outlined">search</span>
                    </div>
                    <div class="user-profile">
                        <span id="user-name-display">Cargando...</span>
                    </div>
                </div>
            </header>

            <div id="content-area">
                </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="menu.js"></script>
</body>
</html>
